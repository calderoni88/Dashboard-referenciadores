<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Referenciadores</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0e0d0a;
    --paper: #f5f0e8;
    --cream: #ede8db;
    --gold: #c9a84c;
    --gold-light: #f0d98a;
    --rust: #b84c2e;
    --teal: #2e6b6b;
    --muted: #7a7265;
    --border: #d4cfc4;
    --tier1: #b84c2e;
    --tier2: #c9a84c;
    --tier3: #2e6b6b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 32px 48px 28px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 3px solid var(--gold);
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2.6rem;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  header h1 em {
    color: var(--gold);
    font-style: italic;
  }

  header p {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-top: 6px;
  }

  .legend {
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: flex-end;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.68rem;
    color: #b0a898;
    letter-spacing: 0.06em;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  /* STATS BAR */
  .stats-bar {
    background: var(--cream);
    border-bottom: 1px solid var(--border);
    padding: 20px 48px;
    display: flex;
    gap: 48px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
  }

  .stat-value {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    color: var(--ink);
  }

  .stat-value span {
    font-size: 0.85rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
  }

  /* FILTER BAR */
  .filter-bar {
    padding: 16px 48px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    background: var(--paper);
  }

  .filter-label {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-right: 4px;
  }

  .filter-btn {
    background: none;
    border: 1.5px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    padding: 6px 14px;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.15s;
  }

  .filter-btn:hover { border-color: var(--ink); color: var(--ink); }
  .filter-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  .search-input {
    margin-left: auto;
    background: none;
    border: 1.5px solid var(--border);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    padding: 6px 14px;
    width: 220px;
    outline: none;
    letter-spacing: 0.04em;
    transition: border-color 0.15s;
  }

  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: var(--gold); }

  /* TABLE CONTAINER */
  .table-container {
    padding: 32px 48px 48px;
  }

  /* TABLE */
  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead tr {
    border-bottom: 2px solid var(--ink);
  }

  th {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
    padding: 0 16px 12px 0;
    text-align: left;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
  }

  th:hover { color: var(--ink); }
  th.sorted { color: var(--ink); }
  th .sort-arrow { margin-left: 4px; opacity: 0.4; }
  th.sorted .sort-arrow { opacity: 1; color: var(--gold); }

  th:last-child, td:last-child { text-align: right; padding-right: 0; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:hover { background: var(--cream); }

  td {
    padding: 16px 16px 16px 0;
    font-size: 0.82rem;
    vertical-align: middle;
  }

  /* Cliente cell */
  .client-cell {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .client-name {
    font-family: 'DM Serif Display', serif;
    font-size: 1rem;
    color: var(--ink);
  }

  .client-ref {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  /* Tier badge */
  .tier-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 2px;
    font-weight: 500;
  }

  .tier-1 { background: #f9ebe7; color: var(--tier1); }
  .tier-2 { background: #faf3dd; color: #8a6a10; }
  .tier-3 { background: #e3efef; color: var(--tier3); }

  /* Billing amount */
  .billing-amount {
    font-size: 0.88rem;
    color: var(--ink);
    letter-spacing: 0.02em;
  }

  /* Commission bar */
  .commission-cell {
    min-width: 200px;
  }

  .commission-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }

  .commission-amount {
    font-family: 'DM Serif Display', serif;
    font-size: 1.05rem;
    color: var(--ink);
  }

  .commission-pct {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  .bar-track {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s cubic-bezier(.4,0,.2,1);
  }

  .fill-1 { background: var(--tier1); }
  .fill-2 { background: var(--gold); }
  .fill-3 { background: var(--teal); }

  /* Progress to next tier */
  .next-tier {
    font-size: 0.62rem;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.04em;
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 64px;
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing: 0.06em;
  }

  /* Tier info box */
  .tier-info {
    background: var(--ink);
    color: var(--paper);
    padding: 20px 48px;
    display: flex;
    gap: 48px;
    font-size: 0.68rem;
    letter-spacing: 0.06em;
  }

  .tier-info-item {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .tier-info-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }

  .tier-info-text { color: #a09888; }
  .tier-info-text strong { color: var(--gold); }

  /* Totals row */
  tfoot tr td {
    border-top: 2px solid var(--ink);
    padding-top: 16px;
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  tfoot .totals-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

  tfoot .totals-value {
    font-family: 'DM Serif Display', serif;
    font-size: 1.2rem;
    color: var(--ink);
  }

  @media (max-width: 900px) {
    header, .stats-bar, .filter-bar, .table-container, .tier-info {
      padding-left: 20px; padding-right: 20px;
    }
    .stats-bar { flex-wrap: wrap; gap: 20px; }
    .tier-info { flex-wrap: wrap; gap: 16px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Dashboard de <em>Referenciadores</em></h1>
    <p>Comisiones · Esquema escalonado por tramo de facturación</p>
  </div>
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--tier1)"></div>
      TIER 1 · hasta $10K → 25%
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--gold)"></div>
      TIER 2 · $10K–$25K → 30%
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--teal)"></div>
      TIER 3 · +$25K → 35%
    </div>
  </div>
</header>

<div class="stats-bar" id="statsBar">
  <!-- Filled by JS -->
</div>

<div class="filter-bar">
  <span class="filter-label">Filtrar:</span>
  <button class="filter-btn active" onclick="setFilter('all', this)">Todos</button>
  <button class="filter-btn" onclick="setFilter(1, this)">Tier 1 · 25%</button>
  <button class="filter-btn" onclick="setFilter(2, this)">Tier 2 · 30%</button>
  <button class="filter-btn" onclick="setFilter(3, this)">Tier 3 · 35%</button>
  <input class="search-input" type="text" placeholder="Buscar cliente o referenciador..." oninput="setSearch(this.value)" id="searchInput">
</div>

<div class="table-container">
  <table id="mainTable">
    <thead>
      <tr>
        <th onclick="sortBy('client')" id="th-client">Cliente <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('referrer')" id="th-referrer">Referenciador <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('billing')" id="th-billing">Facturación total <span class="sort-arrow">↕</span></th>
        <th>Tramo</th>
        <th onclick="sortBy('commission')" id="th-commission" style="min-width:220px">Comisión <span class="sort-arrow">↕</span></th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
    <tfoot id="tableFoot"></tfoot>
  </table>
</div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
const data = [
  { client: "Fernández & Asociados",  referrer: "Marcos Ibáñez",    billing: 8400   },
  { client: "Grupo Horizonte SA",     referrer: "Lucía Romero",     billing: 22500  },
  { client: "Tech Solutions SRL",     referrer: "Pablo Vega",       billing: 31200  },
  { client: "Constructora Del Valle", referrer: "Marcos Ibáñez",    billing: 5800   },
  { client: "Importadora Pacífico",   referrer: "Valentina Cruz",   billing: 14700  },
  { client: "Estudio Jurídico Pons",  referrer: "Lucía Romero",     billing: 28900  },
  { client: "Agro Pampa SA",          referrer: "Diego Herrera",    billing: 9200   },
  { client: "Clínica San Martín",     referrer: "Valentina Cruz",   billing: 47300  },
  { client: "Distribuidora Norte",    referrer: "Pablo Vega",       billing: 12600  },
  { client: "Metalúrgica Rivero",     referrer: "Diego Herrera",    billing: 19800  },
  { client: "Farmacia Central",       referrer: "Marcos Ibáñez",    billing: 3100   },
  { client: "Hotel Mirador",          referrer: "Lucía Romero",     billing: 62000  },
];

// ── LOGIC ─────────────────────────────────────────────────────────────────────
function getTier(billing) {
  if (billing < 10000)  return { tier: 1, label: "< $10K",    cls: "tier-1", fillCls: "fill-1" };
  if (billing < 25000)  return { tier: 2, label: "$10K–$25K", cls: "tier-2", fillCls: "fill-2" };
  return                       { tier: 3, label: "> $25K",    cls: "tier-3", fillCls: "fill-3" };
}

// Comisión escalonada: 25% hasta $10k, 30% de $10k a $25k, 35% sobre $25k
function calcCommission(billing) {
  const t1 = Math.min(billing, 10000) * 0.25;
  const t2 = Math.max(0, Math.min(billing, 25000) - 10000) * 0.30;
  const t3 = Math.max(0, billing - 25000) * 0.35;
  return t1 + t2 + t3;
}

// Descripción desglosada para mostrar en la celda
function commissionBreakdown(billing) {
  const parts = [];
  parts.push(`${fmt(Math.min(billing,10000))} × 25%`);
  if (billing > 10000) parts.push(`${fmt(Math.min(billing,25000)-10000)} × 30%`);
  if (billing > 25000) parts.push(`${fmt(billing-25000)} × 35%`);
  return parts.join(" + ");
}

function getNextTierInfo(billing) {
  if (billing < 10000)  return { next: 10000, nextPct: 30 };
  if (billing < 25000)  return { next: 25000, nextPct: 35 };
  return null;
}

function fmt(n) {
  return "$" + n.toLocaleString("es-AR", { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

// Bar fill: show commission as % of billing (visual context)
function barPct(billing, pct) {
  // Show tier progress differently: fill represents position within tier range
  if (billing < 10000)  return Math.min(100, (billing / 10000) * 100);
  if (billing < 25000)  return Math.min(100, ((billing - 10000) / 15000) * 100);
  return Math.min(100, Math.min((billing / 100000) * 100, 100));
}

// ── STATE ──────────────────────────────────────────────────────────────────────
let currentFilter = "all";
let currentSearch = "";
let sortKey = null;
let sortDir = 1;

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  render();
}

function setSearch(v) {
  currentSearch = v.toLowerCase();
  render();
}

function sortBy(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = 1; }
  document.querySelectorAll("th").forEach(t => t.classList.remove("sorted"));
  const el = document.getElementById("th-" + key);
  if (el) el.classList.add("sorted");
  render();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  let rows = data.map(d => ({ ...d, ...getTier(d.billing), commission: calcCommission(d.billing) }));

  if (currentFilter !== "all") rows = rows.filter(r => r.tier === currentFilter);

  if (currentSearch) {
    rows = rows.filter(r =>
      r.client.toLowerCase().includes(currentSearch) ||
      r.referrer.toLowerCase().includes(currentSearch)
    );
  }

  if (sortKey) {
    rows.sort((a, b) => {
      const map = { client: "client", referrer: "referrer", billing: "billing", commission: "commission" };
      const k = map[sortKey];
      return typeof a[k] === "string"
        ? a[k].localeCompare(b[k]) * sortDir
        : (a[k] - b[k]) * sortDir;
    });
  }

  const tbody = document.getElementById("tableBody");
  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" class="empty">Sin resultados para los filtros seleccionados.</td></tr>`;
    document.getElementById("tableFoot").innerHTML = "";
    renderStats([], data);
    return;
  }

  tbody.innerHTML = rows.map(r => {
    const bp = barPct(r.billing, r.pct);
    const nextInfo = getNextTierInfo(r.billing);
    const nextLabel = nextInfo
      ? `<div class="next-tier">Faltan ${fmt(nextInfo.next - r.billing)} para el ${nextInfo.nextPct}%</div>`
      : `<div class="next-tier" style="color:var(--teal)">✓ Máximo tramo alcanzado</div>`;

    return `
    <tr>
      <td>
        <div class="client-cell">
          <span class="client-name">${r.client}</span>
        </div>
      </td>
      <td>
        <span style="color:var(--ink);font-size:0.82rem">${r.referrer}</span>
      </td>
      <td>
        <span class="billing-amount">${fmt(r.billing)}</span>
      </td>
      <td>
        <span class="tier-badge ${r.cls}">TIER ${r.tier} · ${Math.round(r.pct*100)}%</span>
      </td>
      <td class="commission-cell">
        <div class="commission-header">
          <span class="commission-amount">${fmt(r.commission)}</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill ${r.fillCls}" style="width:${bp}%"></div>
        </div>
        <div class="next-tier">${commissionBreakdown(r.billing)}</div>
        ${nextLabel}
      </td>
    </tr>`;
  }).join("");

  // Footer
  const totalBilling = rows.reduce((s, r) => s + r.billing, 0);
  const totalComm = rows.reduce((s, r) => s + calcCommission(r.billing), 0);
  document.getElementById("tableFoot").innerHTML = `
    <tr>
      <td class="totals-label" colspan="2">TOTALES (${rows.length} clientes)</td>
      <td><span class="totals-value">${fmt(totalBilling)}</span></td>
      <td></td>
      <td style="text-align:right"><span class="totals-value">${fmt(totalComm)}</span></td>
    </tr>`;

  renderStats(rows, data);
}

function renderStats(filtered, all) {
  const totalComm = filtered.reduce((s, r) => s + calcCommission(r.billing), 0);
  const totalBilling = filtered.reduce((s, r) => s + r.billing, 0);
  const tier3 = filtered.filter(r => getTier(r.billing).tier === 3).length;
  const uniqueRefs = new Set(filtered.map(r => r.referrer)).size;

  document.getElementById("statsBar").innerHTML = `
    <div class="stat">
      <span class="stat-label">Clientes</span>
      <span class="stat-value">${filtered.length}</span>
    </div>
    <div class="stat">
      <span class="stat-label">Facturación total</span>
      <span class="stat-value">${fmt(totalBilling)}</span>
    </div>
    <div class="stat">
      <span class="stat-label">Comisiones</span>
      <span class="stat-value" style="color:var(--gold)">${fmt(totalComm)}</span>
    </div>
    <div class="stat">
      <span class="stat-label">Referenciadores</span>
      <span class="stat-value">${uniqueRefs}</span>
    </div>
    <div class="stat">
      <span class="stat-label">En tier máximo (35%)</span>
      <span class="stat-value" style="color:var(--teal)">${tier3}</span>
    </div>
  `;
}

render();
</script>
</body>
</html>
