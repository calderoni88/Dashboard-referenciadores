<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Referenciadores · VetaCap</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* ── DARK MODE (default) ── */
  :root {
    --bg: #0a0a0a;
    --bg2: #141414;
    --text: #ffffff;
    --text-dim: #6b6b6b;
    --border: #2a2a2a;
    --accent: #2deb52;
    --header-bg: #000000;
    --stat-value: #ffffff;
    --tier1-bg: #222222; --tier1-text: #888888;
    --tier2-bg: #0d3318; --tier2-text: #2deb52;
    --tier3-bg: #0a2e14; --tier3-text: #2deb52;
    --bar1: #444444; --bar2: #1db83c; --bar3: #2deb52;
    --input-bg: #141414;
    --row-hover: #1a1a1a;
    --toggle-bg: #1e1e1e;
    --toggle-border: #333333;
  }

  body.light {
    --bg: #f2f2f2;
    --bg2: #e6e6e6;
    --text: #0d0d0d;
    --text-dim: #888888;
    --border: #cccccc;
    --accent: #15a030;
    --header-bg: #0d0d0d;
    --stat-value: #0d0d0d;
    --tier1-bg: #e8e8e8; --tier1-text: #666666;
    --tier2-bg: #d4f0de; --tier2-text: #0b6622;
    --tier3-bg: #b8e8c8; --tier3-text: #084d1a;
    --bar1: #bbbbbb; --bar2: #1db83c; --bar3: #15a030;
    --input-bg: #ffffff;
    --row-hover: #e0e0e0;
    --toggle-bg: #e0e0e0;
    --toggle-border: #bbbbbb;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  /* ── HEADER ── */
  header {
    background: var(--header-bg);
    padding: 28px 48px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid var(--accent);
  }

  .header-left { display: flex; flex-direction: column; gap: 5px; }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2.2rem;
    letter-spacing: -0.02em;
    line-height: 1;
    color: #ffffff;
  }

  header h1 em {
    color: #2deb52;
    font-style: italic;
  }

  header p {
    font-size: 0.68rem;
    color: #666666;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

  .header-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 14px;
  }

  /* ── TOGGLE ── */
  .theme-toggle {
    display: flex;
    align-items: center;
    background: var(--toggle-bg);
    border: 1.5px solid var(--toggle-border);
    border-radius: 24px;
    padding: 3px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.3s;
    user-select: none;
  }

  .theme-toggle:hover { border-color: var(--accent); }

  .toggle-opt {
    font-size: 0.65rem;
    letter-spacing: 0.05em;
    padding: 4px 12px;
    border-radius: 18px;
    color: var(--text-dim);
    transition: all 0.2s;
    white-space: nowrap;
  }

  .toggle-opt.on {
    background: var(--accent);
    color: #000000;
    font-weight: 600;
  }

  /* ── LEGEND ── */
  .legend { display: flex; flex-direction: column; gap: 5px; align-items: flex-end; }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.63rem;
    color: #555555;
    letter-spacing: 0.06em;
  }

  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* ── STATS BAR ── */
  .stats-bar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 18px 48px;
    display: flex;
    gap: 48px;
    transition: background 0.3s;
  }

  .stat { display: flex; flex-direction: column; gap: 2px; }

  .stat-label {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-dim);
  }

  .stat-value {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    color: var(--stat-value);
    transition: color 0.3s;
  }

  /* ── FILTER BAR ── */
  .filter-bar {
    padding: 14px 48px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    transition: background 0.3s;
  }

  .filter-label {
    font-size: 0.63rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    margin-right: 4px;
  }

  .filter-btn {
    background: none;
    border: 1.5px solid var(--border);
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    padding: 5px 12px;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.15s;
    border-radius: 2px;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: #000000; border-color: var(--accent); font-weight: 600; }

  .search-input {
    margin-left: auto;
    background: var(--input-bg);
    border: 1.5px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    padding: 5px 12px;
    width: 220px;
    outline: none;
    letter-spacing: 0.04em;
    border-radius: 2px;
    transition: border-color 0.15s, background 0.3s, color 0.3s;
  }

  .search-input::placeholder { color: var(--text-dim); }
  .search-input:focus { border-color: var(--accent); }

  /* ── TABLE ── */
  .table-container { padding: 28px 48px 48px; }

  table { width: 100%; border-collapse: collapse; }

  thead tr { border-bottom: 2px solid var(--accent); }

  th {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--text-dim);
    padding: 0 16px 12px 0;
    text-align: left;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
    transition: color 0.15s;
  }

  th:hover { color: var(--text); }
  th.sorted { color: var(--text); }
  th .sa { margin-left: 4px; opacity: 0.35; }
  th.sorted .sa { opacity: 1; color: var(--accent); }
  th:last-child, td:last-child { text-align: right; padding-right: 0; }

  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:hover { background: var(--row-hover); }

  td { padding: 14px 16px 14px 0; font-size: 0.82rem; vertical-align: middle; }

  .client-name {
    font-family: 'DM Serif Display', serif;
    font-size: 1rem;
    color: var(--text);
  }

  .tier-badge {
    display: inline-flex;
    align-items: center;
    font-size: 0.62rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 2px;
    font-weight: 500;
    transition: background 0.3s, color 0.3s;
  }

  .tier-1 { background: var(--tier1-bg); color: var(--tier1-text); }
  .tier-2 { background: var(--tier2-bg); color: var(--tier2-text); }
  .tier-3 { background: var(--tier3-bg); color: var(--tier3-text); }

  .billing-amount { font-size: 0.88rem; color: var(--text); }

  .commission-cell { min-width: 200px; }

  .commission-amount {
    font-family: 'DM Serif Display', serif;
    font-size: 1.05rem;
    color: var(--text);
    display: block;
    margin-bottom: 6px;
  }

  .bar-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s cubic-bezier(.4,0,.2,1), background 0.3s; }
  .fill-1 { background: var(--bar1); }
  .fill-2 { background: var(--bar2); }
  .fill-3 { background: var(--bar3); }

  .breakdown { font-size: 0.59rem; color: var(--text-dim); margin-top: 5px; letter-spacing: 0.03em; }
  .next-info  { font-size: 0.59rem; color: var(--text-dim); margin-top: 2px; letter-spacing: 0.03em; }
  .next-info.max { color: var(--accent); }

  /* ── FOOTER ── */
  tfoot tr td { border-top: 2px solid var(--accent); padding-top: 14px; font-size: 0.75rem; color: var(--text-dim); }
  .totals-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.12em; }
  .totals-value { font-family: 'DM Serif Display', serif; font-size: 1.2rem; color: var(--stat-value); }

  .empty { text-align: center; padding: 60px; color: var(--text-dim); font-size: 0.78rem; letter-spacing: 0.06em; }

  @media (max-width: 900px) {
    header, .stats-bar, .filter-bar, .table-container { padding-left: 20px; padding-right: 20px; }
    .stats-bar { flex-wrap: wrap; gap: 20px; }
    header h1 { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Dashboard de <em>Referenciadores</em></h1>
    <p>Comisiones · Esquema escalonado por tramo de facturación</p>
  </div>
  <div class="header-right">
    <div class="theme-toggle" onclick="toggleTheme()">
      <span class="toggle-opt on" id="opt-dark">🌙 Noche</span>
      <span class="toggle-opt"    id="opt-light">☀️ Día</span>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#444"></div>TIER 1 · hasta $10K → 25%</div>
      <div class="legend-item"><div class="legend-dot" style="background:#1db83c"></div>TIER 2 · $10K–$25K → 30%</div>
      <div class="legend-item"><div class="legend-dot" style="background:#2deb52"></div>TIER 3 · +$25K → 35%</div>
    </div>
  </div>
</header>

<div class="stats-bar" id="statsBar"></div>

<div class="filter-bar">
  <span class="filter-label">Filtrar:</span>
  <button class="filter-btn active" onclick="setFilter('all',this)">Todos</button>
  <button class="filter-btn" onclick="setFilter(1,this)">Tier 1 · 25%</button>
  <button class="filter-btn" onclick="setFilter(2,this)">Tier 2 · 30%</button>
  <button class="filter-btn" onclick="setFilter(3,this)">Tier 3 · 35%</button>
  <input class="search-input" type="text" placeholder="Buscar cliente o referenciador..." oninput="setSearch(this.value)">
</div>

<div class="table-container">
  <table>
    <thead>
      <tr>
        <th onclick="sortBy('client')"     id="th-client">Cliente <span class="sa">↕</span></th>
        <th onclick="sortBy('referrer')"   id="th-referrer">Referenciador <span class="sa">↕</span></th>
        <th onclick="sortBy('billing')"    id="th-billing">Facturación total <span class="sa">↕</span></th>
        <th>Tramo</th>
        <th onclick="sortBy('commission')" id="th-commission" style="min-width:230px">Comisión <span class="sa">↕</span></th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
    <tfoot id="tableFoot"></tfoot>
  </table>
</div>

<script>
const data = [
  { client:"Fernández & Asociados",  referrer:"Marcos Ibáñez",   billing:8400  },
  { client:"Grupo Horizonte SA",     referrer:"Lucía Romero",    billing:22500 },
  { client:"Tech Solutions SRL",     referrer:"Pablo Vega",      billing:31200 },
  { client:"Constructora Del Valle", referrer:"Marcos Ibáñez",   billing:5800  },
  { client:"Importadora Pacífico",   referrer:"Valentina Cruz",  billing:14700 },
  { client:"Estudio Jurídico Pons",  referrer:"Lucía Romero",    billing:28900 },
  { client:"Agro Pampa SA",          referrer:"Diego Herrera",   billing:9200  },
  { client:"Clínica San Martín",     referrer:"Valentina Cruz",  billing:47300 },
  { client:"Distribuidora Norte",    referrer:"Pablo Vega",      billing:12600 },
  { client:"Metalúrgica Rivero",     referrer:"Diego Herrera",   billing:19800 },
  { client:"Farmacia Central",       referrer:"Marcos Ibáñez",   billing:3100  },
  { client:"Hotel Mirador",          referrer:"Lucía Romero",    billing:62000 },
];

// ── THEME ──
let isLight = false;
function toggleTheme() {
  isLight = !isLight;
  document.body.classList.toggle('light', isLight);
  document.getElementById('opt-dark').classList.toggle('on', !isLight);
  document.getElementById('opt-light').classList.toggle('on', isLight);
}

// ── LOGIC ──
function getTier(b) {
  if (b < 10000) return { tier:1, cls:"tier-1", fc:"fill-1" };
  if (b < 25000) return { tier:2, cls:"tier-2", fc:"fill-2" };
  return               { tier:3, cls:"tier-3", fc:"fill-3" };
}

function calcCommission(b) {
  return Math.min(b,10000)*0.25 + Math.max(0,Math.min(b,25000)-10000)*0.30 + Math.max(0,b-25000)*0.35;
}

function breakdown(b) {
  let p = [fmt(Math.min(b,10000))+" × 25%"];
  if (b>10000) p.push(fmt(Math.min(b,25000)-10000)+" × 30%");
  if (b>25000) p.push(fmt(b-25000)+" × 35%");
  return p.join(" + ");
}

function fmt(n) { return "$"+n.toLocaleString("es-AR",{minimumFractionDigits:0,maximumFractionDigits:0}); }

function barPct(b) {
  if (b<10000) return Math.min(100,(b/10000)*100);
  if (b<25000) return Math.min(100,((b-10000)/15000)*100);
  return Math.min(100,(b/100000)*100);
}

// ── STATE ──
let filt="all", search="", sortK=null, sortD=1;

function setFilter(f,btn) {
  filt=f;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  render();
}
function setSearch(v) { search=v.toLowerCase(); render(); }
function sortBy(k) {
  if(sortK===k) sortD*=-1; else {sortK=k;sortD=1;}
  document.querySelectorAll("th").forEach(t=>t.classList.remove("sorted"));
  const el=document.getElementById("th-"+k);
  if(el) el.classList.add("sorted");
  render();
}

// ── RENDER ──
function render() {
  let rows = data.map(d=>({...d,...getTier(d.billing),commission:calcCommission(d.billing)}));
  if(filt!=="all") rows=rows.filter(r=>r.tier===filt);
  if(search) rows=rows.filter(r=>r.client.toLowerCase().includes(search)||r.referrer.toLowerCase().includes(search));
  if(sortK) {
    rows.sort((a,b)=>{
      const k={client:"client",referrer:"referrer",billing:"billing",commission:"commission"}[sortK];
      return typeof a[k]==="string"?a[k].localeCompare(b[k])*sortD:(a[k]-b[k])*sortD;
    });
  }

  const tbody=document.getElementById("tableBody");
  if(!rows.length) {
    tbody.innerHTML=`<tr><td colspan="5" class="empty">Sin resultados.</td></tr>`;
    document.getElementById("tableFoot").innerHTML="";
    renderStats([]);
    return;
  }

  tbody.innerHTML=rows.map(r=>{
    const ni = r.billing<10000?{next:10000,p:30}:r.billing<25000?{next:25000,p:35}:null;
    const nxt = ni
      ? `<div class="next-info">Faltan ${fmt(ni.next-r.billing)} para el ${ni.p}%</div>`
      : `<div class="next-info max">✓ Máximo tramo alcanzado</div>`;
    return `<tr>
      <td><span class="client-name">${r.client}</span></td>
      <td><span style="color:var(--text);font-size:.82rem">${r.referrer}</span></td>
      <td><span class="billing-amount">${fmt(r.billing)}</span></td>
      <td><span class="tier-badge ${r.cls}">TIER ${r.tier}</span></td>
      <td class="commission-cell">
        <span class="commission-amount">${fmt(r.commission)}</span>
        <div class="bar-track"><div class="bar-fill ${r.fc}" style="width:${barPct(r.billing)}%"></div></div>
        <div class="breakdown">${breakdown(r.billing)}</div>
        ${nxt}
      </td>
    </tr>`;
  }).join("");

  const tb=rows.reduce((s,r)=>s+r.billing,0);
  const tc=rows.reduce((s,r)=>s+r.commission,0);
  document.getElementById("tableFoot").innerHTML=`<tr>
    <td class="totals-label" colspan="2">TOTALES (${rows.length} clientes)</td>
    <td><span class="totals-value">${fmt(tb)}</span></td><td></td>
    <td style="text-align:right"><span class="totals-value">${fmt(tc)}</span></td>
  </tr>`;

  renderStats(rows);
}

function renderStats(rows) {
  const tb=rows.reduce((s,r)=>s+r.billing,0);
  const tc=rows.reduce((s,r)=>s+r.commission,0);
  const t3=rows.filter(r=>r.tier===3).length;
  const refs=new Set(rows.map(r=>r.referrer)).size;
  document.getElementById("statsBar").innerHTML=`
    <div class="stat"><span class="stat-label">Clientes</span><span class="stat-value">${rows.length}</span></div>
    <div class="stat"><span class="stat-label">Facturación total</span><span class="stat-value">${fmt(tb)}</span></div>
    <div class="stat"><span class="stat-label">Comisiones</span><span class="stat-value" style="color:var(--accent)">${fmt(tc)}</span></div>
    <div class="stat"><span class="stat-label">Referenciadores</span><span class="stat-value">${refs}</span></div>
    <div class="stat"><span class="stat-label">En tier máximo (35%)</span><span class="stat-value" style="color:var(--accent)">${t3}</span></div>
  `;
}

render();
</script>
</body>
</html>
